# Docker Compose — Airflow standalone cho DATN pipeline
# Lưu ý:
#   - SQL Server đã chạy bên ngoài (host); Airflow kết nối qua TARGET_SERVER trong .env
#   - Mount nguyên project vào /opt/airflow để DAG, scripts, dbt_bank đều dùng được
#   - LocalExecutor đủ cho dev; production nên dùng CeleryExecutor

x-airflow-common: &airflow-common
  build:
    context: .
    dockerfile: Dockerfile
  image: datn-airflow:2.9.0
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs/airflow
    AIRFLOW__LOGGING__LOG_RETENTION_DAYS: "14"
    AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    AIRFLOW__SCHEDULER__MIN_FILE_PROCESS_INTERVAL: "30"
    PYTHONPATH: /opt/airflow
    TZ: Asia/Ho_Chi_Minh
    AIRFLOW__EMAIL__EMAIL_BACKEND: airflow.utils.email.send_email_smtp
    AIRFLOW__SMTP__SMTP_HOST: smtp.gmail.com
    AIRFLOW__SMTP__SMTP_STARTTLS: "true"
    AIRFLOW__SMTP__SMTP_SSL: "false"
    AIRFLOW__SMTP__SMTP_PORT: "587"
    AIRFLOW__SMTP__SMTP_USER: "${SMTP_USER}"
    AIRFLOW__SMTP__SMTP_PASSWORD: "${SMTP_PASSWORD}"
    AIRFLOW__SMTP__SMTP_MAIL_FROM: "${SMTP_USER}"
  env_file:
    - .env
  volumes:
    - ./dags:/opt/airflow/dags
    - ./scripts:/opt/airflow/scripts
    - ./dbt_bank:/opt/airflow/dbt_bank
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./sql:/opt/airflow/sql
    - ./seeds:/opt/airflow/seeds
  depends_on:
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:14
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
    restart: unless-stopped

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate
        airflow users create \
            --username admin \
            --password admin \
            --firstname Admin \
            --lastname User \
            --role Admin \
            --email truongbatbai00@gmail.com || true
        echo "Airflow init done."

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 30s
      retries: 5
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: unless-stopped
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  demo-web:
    build:
      context: .
      dockerfile: Dockerfile
    image: datn-airflow:2.9.0
    entrypoint: []
    command: ["/opt/airflow/.venv_ocr/bin/python", "/opt/airflow/demo_web/app.py"]
    ports:
      - "5000:5000"
    volumes:
      - ./demo_web:/opt/airflow/demo_web
      - ./scripts:/opt/airflow/scripts
    env_file:
      - .env
    environment:
      TZ: Asia/Ho_Chi_Minh
    restart: unless-stopped

volumes:
  postgres-data:
