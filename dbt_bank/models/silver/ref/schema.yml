version: 2

models:
  - name: ref_mcc
    description: >
      Bảng tham chiếu MCC (Merchant Category Code) theo chuẩn ISO 18245.
      Full refresh mỗi pipeline run. Category được phân loại tự động theo dải số.
    columns:
      - name: mcc_code
        description: "Mã MCC (integer)"
        tests: [not_null, unique]
      - name: description
        description: "Mô tả loại hình kinh doanh"
        tests: [not_null]
      - name: category
        description: "Nhóm danh mục lớn (phân loại theo dải MCC code)"
        tests: [not_null]
