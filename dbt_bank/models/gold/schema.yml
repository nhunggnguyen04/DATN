version: 2

models:

  # ── DIMENSIONS ─────────────────────────────────────────────────────────────

  - name: dim_customer
    description: >
      Dimension khách hàng — current state (active record từ sat_customer_profile SCD2).
    columns:
      - name: hk_customer
        description: Hash key từ Data Vault
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Natural key — business key từ hub_customer
        tests:
          - unique
          - not_null
      - name: income_segment
        description: "Computed: Low / Medium / High / Premium theo yearly_income"
        tests:
          - accepted_values:
              arguments:
                values: ['Low', 'Medium', 'High', 'Premium']
      - name: credit_risk_tier
        description: "Computed: Poor / Fair / Good / Excellent theo credit_score"
        tests:
          - accepted_values:
              arguments:
                values: ['Excellent', 'Good', 'Fair', 'Poor']

  - name: dim_card
    description: >
      Dimension thẻ — current state (SCD2).
    columns:
      - name: hk_card
        description: Hash key từ Data Vault
        tests:
          - unique
          - not_null
      - name: card_id
        description: Natural key
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Denormalized FK — customer sở hữu thẻ
        tests:
          - not_null

  - name: dim_merchant
    description: >
      Dimension merchant — derived từ hub_merchant + sat_transaction_detail.
    columns:
      - name: hk_merchant
        description: Hash key từ Data Vault
        tests:
          - unique
          - not_null
      - name: merchant_id
        description: Natural key
        tests:
          - unique
          - not_null

  - name: dim_mcc
    description: >
      Dimension MCC (Merchant Category Code).
    columns:
      - name: hk_mcc
        description: Hash key từ Data Vault
        tests:
          - unique
          - not_null
      - name: mcc_id
        description: Natural key
        tests:
          - unique
          - not_null

  # ── FACT ───────────────────────────────────────────────────────────────────

  - name: fact_transaction
    description: >
      Fact table chính — grain: 1 row = 1 giao dịch.
    columns:
      - name: transaction_id
        description: Natural key / degenerate dimension
        tests:
          - unique
          - not_null
      - name: customer_id
        description: FK → dim_customer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_id
      - name: card_id
        description: FK → dim_card
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_card')
                field: card_id
      - name: date_key
        description: FK → dim_date (seed), format YYYYMMDD
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: amount
        description: Số tiền giao dịch
        tests:
          - not_null
      - name: has_error
        description: "Computed: 1 nếu cột errors không null/rỗng"
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: is_chip_used
        description: "Computed: 1 nếu use_chip = 'Chip Transaction'"
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
