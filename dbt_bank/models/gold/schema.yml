version: 2

models:

  # ── DIMENSIONS ─────────────────────────────────────────────────────────────

  - name: dim_customer
    description: >
      Dimension khách hàng — current state (active record từ sat_customer_profile SCD2).
      Chứa computed columns debt_to_income_ratio, income_segment, credit_risk_tier,
      years_to_retirement để chatbot và Power BI đọc cùng cột, số liệu luôn khớp.
    columns:
      - name: customer_key
        description: Surrogate key INT IDENTITY (auto-generated)
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Natural key — business key từ hub_customer
        tests:
          - unique
          - not_null
      - name: income_segment
        description: "Computed: Low / Medium / High / Premium theo yearly_income"
        tests:
          - accepted_values:
              arguments:
                values: ['Low', 'Medium', 'High', 'Premium']
      - name: credit_risk_tier
        description: "Computed: Poor / Fair / Good / Excellent theo credit_score"
        tests:
          - accepted_values:
              arguments:
                values: ['Excellent', 'Good', 'Fair', 'Poor']

  - name: dim_card
    description: >
      Dimension thẻ — current state (SCD2). Denormalize customer_id qua link_customer_card
      (outrigger pattern). Loại bỏ card_number và cvv (PCI).
    columns:
      - name: card_key
        description: Surrogate key INT IDENTITY (auto-generated)
        tests:
          - unique
          - not_null
      - name: card_id
        description: Natural key
        tests:
          - unique
          - not_null
      - name: customer_id
        description: Denormalized FK — customer sở hữu thẻ (via link_customer_card)
        tests:
          - not_null

  - name: dim_merchant
    description: >
      Dimension merchant — derived từ hub_merchant + sat_transaction_detail.
      Location (city/state/zip) lấy từ giao dịch gần nhất vì Bronze không có bảng merchants riêng.
    columns:
      - name: merchant_key
        description: Surrogate key INT IDENTITY (auto-generated)
        tests:
          - unique
          - not_null
      - name: merchant_id
        description: Natural key
        tests:
          - unique
          - not_null

  - name: dim_mcc
    description: >
      Dimension MCC (Merchant Category Code) — mô tả ngành hàng.
      Nguồn: hub_mcc + sat_mcc_detail (SCD1).
    columns:
      - name: mcc_key
        description: Surrogate key INT IDENTITY (auto-generated)
        tests:
          - unique
          - not_null
      - name: mcc_id
        description: Natural key
        tests:
          - unique
          - not_null

  # ── FACT ───────────────────────────────────────────────────────────────────

  - name: fact_transaction
    description: >
      Fact table chính — grain: 1 row = 1 giao dịch (157k rows).
      Incremental delete+insert theo transaction_datetime = run_date (idempotent).
      has_error và is_chip_used là computed columns chia sẻ giữa dashboard và chatbot.
    columns:
      - name: transaction_key
        description: Surrogate key INT IDENTITY (auto-generated)
        tests:
          - unique
          - not_null
      - name: transaction_id
        description: Natural key / degenerate dimension
        tests:
          - unique
          - not_null
      - name: customer_key
        description: FK → dim_customer
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_customer')
                field: customer_key
      - name: card_key
        description: FK → dim_card
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_card')
                field: card_key
      - name: date_key
        description: FK → dim_date (seed), format YYYYMMDD
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_date')
                field: date_key
      - name: amount
        description: Số tiền giao dịch (measure chính)
        tests:
          - not_null
      - name: has_error
        description: "Computed: 1 nếu cột errors không null/rỗng"
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
      - name: is_chip_used
        description: "Computed: 1 nếu use_chip = 'Chip Transaction'"
        tests:
          - accepted_values:
              arguments:
                values: [0, 1]
