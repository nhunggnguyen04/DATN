name: 'dbt_bank'
version: '1.0.0'
config-version: 2

profile: 'dbt_bank'

model-paths: ["models"]
seed-paths: ["seeds"]
test-paths: ["tests"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

clean-targets:
  - "target"
  - "dbt_packages"

models:
  dbt_bank:
    bronze:
      +schema: bronze
      +materialized: table

    silver:
      +schema: silver
      +tags: ['silver']

      hubs:
        +materialized: incremental
        +tags: ['hub']

      links:
        +materialized: incremental
        +tags: ['link']

      satellites:
        +materialized: incremental
        +tags: ['satellite']

      ref:
        +materialized: table
        +tags: ['ref']

    gold:
      +schema: gold
      +materialized: table

seeds:
  dbt_bank:
    +schema: bronze
    +quote_columns: false